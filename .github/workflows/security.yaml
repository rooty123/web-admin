name: Security (SAST + SCA)

on:
  push:
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep \
            --config p/golang \
            --config p/security-audit \
            --severity ERROR \
            --sarif --output semgrep.sarif \
            --error \
            --exclude vendor --exclude '*_test.go' \
            .
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.0
        with:
          version: latest
      - name: Trivy fs SARIF (all severities, report-only)
        run: |
          trivy fs --scanners vuln --format sarif --output trivy.sarif --exit-code 0 .
      - name: Trivy fs gate (CRITICAL/HIGH, fixed only)
        run: |
          trivy fs --scanners vuln --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 .
      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif
