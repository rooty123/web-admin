name: Build and Push Docker Image

on: [push]

permissions:
  contents: read
  id-token: write   # cosign keyless OIDC

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build image (local for scan)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/micro-web-admin:scan

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_HUB_USERNAME }}/micro-web-admin:scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Compute tags
        id: tags
        run: |
          IMAGE=${{ secrets.DOCKER_HUB_USERNAME }}/micro-web-admin
          TAGS="${IMAGE}:${{ github.sha }},${IMAGE}:latest"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${IMAGE}:${{ github.ref_name }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - uses: sigstore/cosign-installer@v3
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Cosign sign release image (keyless)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cosign sign --yes \
            ${{ secrets.DOCKER_HUB_USERNAME }}/micro-web-admin@${{ steps.push.outputs.digest }}

  deploy:
    runs-on: arc-web-admin
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
          set-safe-directory: false

      - uses: azure/setup-kubectl@v4

      - name: Substitute image tag and apply
        run: |
          sed -i "s|__IMAGE_TAG__|${{ github.sha }}|g" manifest.yaml
          kubectl apply -n default -f manifest.yaml
